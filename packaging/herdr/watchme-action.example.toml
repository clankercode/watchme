# Optional Herdr-side bridge example for WatchMe's local protocol.
# Not a verified upstream Herdr plugin format. Install only when you intentionally
# wire Herdr to the owner-only Unix socket contract described in docs/compatibility.md.
#
# Exact files changed when installed via scripts/install.sh --with-herdr-action:
#   PREFIX/share/watchme/herdr/watchme-action.example.toml

[watchme]
enabled = true
protocol = "watchme.herdr"
schema_version = 1
socket_mode = "0600"
authenticate_peer_uid = true
max_request_bytes = 262144

[watchme.capabilities]
process_info = true
pane_read = true
send_text = true
send_keys = true
agent_session = true
agent_state_events = true
notification = true
